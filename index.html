<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TIMDR Visualizer</title>
<style>
body { font-family: Arial; margin: 40px; }
textarea { width: 100%; height: 150px; }
#chart { width: 100%; height: 300px; margin-top: 20px; }
.twist { color: red; font-weight: bold; }
</style>
</head>
<body>

<h2>TIMDR Visualizer — wersja webowa</h2>

<textarea id="inputText" placeholder="Wklej tekst do analizy..."></textarea>
<br><br>

<button onclick="analyze()">Analizuj</button>
<button onclick="autoAnalyze()">Automatyczna analiza repo</button>

<h3>Ustawienia analizy</h3>

<label>Próg skrętu J: <span id="thrVal">0.4</span></label><br>
<input type="range" id="thr" min="0" max="1" step="0.05" value="0.4"
       oninput="document.getElementById('thrVal').innerText=this.value">

<br><br>

<label>Waga Λ (lambda): <span id="wLamVal">1.0</span></label><br>
<input type="range" id="wLam" min="0" max="3" step="0.1" value="1"
       oninput="document.getElementById('wLamVal').innerText=this.value">

<br><br>

<label>Waga τ (tau): <span id="wTauVal">1.0</span></label><br>
<input type="range" id="wTau" min="0" max="3" step="0.1" value="1"
       oninput="document.getElementById('wTauVal').innerText=this.value">

<br><br>

<label>Waga ρ (rho): <span id="wRhoVal">1.0</span></label><br>
<input type="range" id="wRho" min="0" max="3" step="0.1" value="1"
       oninput="document.getElementById('wRhoVal').innerText=this.value">

<br><br>

<div id="results"></div>
<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

function splitSentences(text) {
    return text.split(/(?<=[.!?])\s+/);
}

function lambdaScore(s) {
    const logic = ["jeśli","bo","ponieważ","dlatego","gdy","kiedy","ale","jednak"];
    return logic.reduce((a,w)=>a+(s.toLowerCase().includes(w)?1:0),0);
}

function tauScore(s) {
    const time = ["potem","następnie","wcześniej","później","gdy","kiedy"];
    return time.reduce((a,w)=>a+(s.toLowerCase().includes(w)?1:0),0);
}

function rhoScore(s) {
    return s.split(" ").filter(w => w.length > 7).length;
}

function normalize(arr) {
    const max = Math.max(...arr);
    return max === 0 ? arr : arr.map(v => v/max);
}

function analyze() {
    const text = document.getElementById("inputText").value;
    const sentences = splitSentences(text).filter(s => s.trim().length > 0);

    if (sentences.length === 0) {
        document.getElementById("results").innerHTML = "<p>Brak tekstu do analizy.</p>";
        return;
    }

    const lam = sentences.map(lambdaScore);
    const tau = sentences.map(tauScore);
    const rho = sentences.map(rhoScore);

    const lamN = normalize(lam);
    const tauN = normalize(tau);
    const rhoN = normalize(rho);

    const thr = parseFloat(document.getElementById("thr").value);
    const wLam = parseFloat(document.getElementById("wLam").value);
    const wTau = parseFloat(document.getElementById("wTau").value);
    const wRho = parseFloat(document.getElementById("wRho").value);

    const twists = [];
    for (let i=1; i<sentences.length; i++) {
        const delta =
            Math.abs(lamN[i] - lamN[i-1]) * wLam +
            Math.abs(tauN[i] - tauN[i-1]) * wTau +
            Math.abs(rhoN[i] - rhoN[i-1]) * wRho;

        if (delta > thr) twists.push(i);
    }

    let html = "<h3>Wyniki:</h3>";
    sentences.forEach((s,i)=>{
        const num = i + 1;
        const mark = twists.includes(i) ? "<span class='twist'>[J]</span> " : "";
        html += `<p><b>${num}.</b> ${mark}${s}</p>`;
    });
    document.getElementById("results").innerHTML = html;

    new Chart(document.getElementById("chart"), {
        type: 'line',
        data: {
            labels: sentences.map((_,i)=>"Zdanie "+(i+1)),
            datasets: [
                { label: "Λ", data: lamN, borderColor: "blue" },
                { label: "τ", data: tauN, borderColor: "green" },
                { label: "ρ", data: rhoN, borderColor: "orange" }
            ]
        }
    });
}

async function fetchMarkdown(path) {
    const url = `https://raw.githubusercontent.com/jbackk-lang/TIMDR/main/${path}`;
    const res = await fetch(url);
    return await res.text();
}

async function autoAnalyze() {
    const files = ["README.md", "TIMDR.md", "topologia.md"];
    let combined = "";

    for (const f of files) {
        try {
            const text = await fetchMarkdown(f);
            combined += "\n" + text;
        } catch(e) {
            console.log("Brak pliku:", f);
        }
    }

    document.getElementById("inputText").value = combined;
    analyze();
}

</script>

</body>
</html>
